<div id="preamble">
<div class="sectionbody">
<div class="paragraph">
<p>Banana Pi BPI-R3 Mini Router board with MediaTek MT7986A(Filogic 830) quad core ARM A53 chip design ,2G DDR RAM ,8G eMMC flash onboard,It is a very high performance open source router development board,support Wi-Fi6 2.4G/5G with MT7976C, support 2x 2.5GbE ethernet port.</p>
</div>
<div class="admonitionblock tip">
<table>
<tbody><tr>
<td class="icon">
<i title="Tip" class="fa icon-tip"></i>
</td>
<td class="content">
More Infomation: <a class="is-internal-link is-valid-page" href="/en/BPI-R3_Mini/BananaPi_BPI-R3_Mini">Banana Pi BPI-R3_Mini</a>
</td>
</tr>
</tbody></table>
</div>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_mediatek_mt7986filogic_830"><a href="#_mediatek_mt7986filogic_830" class="toc-anchor">¶</a> MediaTek MT7986(Filogic 830)</h3>
<div class="paragraph">
<p>The MT7986(Filogic 830) integrates four Arm Cortex-A53 cores up to 2GHz with up to 18,000 DMIPs of processing power and 6Gbps of dual 4x4 Wi-Fi6 connectivity. It has two 2.5g Ethernet interfaces and serial peripheral interfaces (SPI). Filogic 830‘s built-in hardware acceleration engine enables fast and reliable Wi-Fi offloading and wireless network connection. In addition, the chip supports Mediatek FastPath™ technology, which is suitable for games, AR/VR and other low-latency applications.</p>
</div>
<div class="paragraph">
<p>Wi-fi 6 has many advantages over its predecessors, including lower latency, larger bandwidth capacity and faster transmission rates. Wireless network devices supporting the 6GHz band mainly use 160MHz wide channel and 6GHz uncongested bandwidth to provide multigigabit transmission and low-latency wi-fi connection, providing reliable wireless network for streaming media, games, AR/VR and other applications.</p>
</div>
</div>
<div class="sect1">
<h2 class="toc-header" id="_specifications"><a href="#_specifications" class="toc-anchor">¶</a> Specifications</h2>
<div class="sectionbody">
<div class="ulist">
<ul>
<li>
<p>MediaTek MT7986A(Filogic 830) Quad core ARM Cortex A53</p>
</li>
<li>
<p>Wifi 6 2.4G/5G（MT7976C）</p>
</li>
<li>
<p>2G DDR RAM</p>
</li>
<li>
<p>8G eMMC flash</p>
</li>
<li>
<p>128MB Nand flash</p>
</li>
<li>
<p>2x 2.5GbE Ethernet port</p>
</li>
<li>
<p>1x M.2 Key B USB inerface</p>
</li>
<li>
<p>1x M.2 KEY M PCIe inerface</p>
</li>
<li>
<p>1x USB2.0 interface</p>
</li>
</ul>
</div>
</div>
</div>
<h1 class="sect0 toc-header" id="_development"><a href="#_development" class="toc-anchor">¶</a> Development</h1>
<div class="sect1">

<div class="sectionbody">
<div class="olist arabic">

<li>
<p>Prepare USB-Serial interface</p>
</li>
<li>
<p>Using your USB-Serial Connect debug console on BPI-R3 MINI</p>

<li>
<p><strong>Debug Uart 3.3v TTL,Baud: 115200.</strong></p>
</li>
<li>
<p>Default IP address for LAN port: <strong>192.168.1.1</strong></p>
</li>
<li>
<p>User name/password: <strong>pi/bananapi ,root/bananapi</strong>.<br>
Or the user is <strong>root without a password</strong>.</p>
</li>
<li>
<p>WIFI: <strong>Operwrt</strong></p>
</li>
</ul>
</div>
<div class="imageblock">

</div>
</div>
</li>
<li>
<p>R3mini boot switch Jumper Setting</p>
<div class="admonitionblock warning">

<td class="icon">

</td>

</li>

</div>

<div class="sect1">
<h2 class="toc-header" id="_warnning"><a href="#_warnning" class="toc-anchor">¶</a> Warnning</h2>
<div class="sectionbody">

<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
Note: Because BPI-R3 MINI can’t support that it boot from SD, So the factory will flash one default image into Nand and EMMC Device.
 Anytime please confirm that one EMMC or Nand device include one bootable image, it’s very important!!
</td>
</tr>
</tbody></table>
</div>
<div class="ulist">
<ul>
<li>
<p>If you want to update EMMC device, please boot from Nand</p>

<div class="sect1">
<h2 class="toc-header" id="_linux"><a href="#_linux" class="toc-anchor">¶</a> Linux</h2>
<div class="sectionbody">
<div class="sect2">
<h3 class="toc-header" id="_install_image_to_onboard_emmc"><a href="#_install_image_to_onboard_emmc" class="toc-anchor">¶</a> Install Image to onboard eMMC</h3>
<div class="admonitionblock warning">
<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
Note: when you want to Update EMMC device, Firstly Change boot switch to boot from Nand device, then after boot up,you need flash one emmc image into EMMC device. Finally you change bootstrap to boot from EMMC.
</td>
</tr>
</tbody></table>
</div>
<div class="paragraph">
<p>Before burning image to eMMC, please prepare a USB disk. Let’s take OpenWrt image (mtk-bpi-r3mini-EMMC-20230719.img, bl2_emmc-r3mini.img) for example, the steps are below:</p>
</div>
<div class="olist arabic">
<ol class="arabic">
<li>
<p>Copy EMMC boot OpenWrt image(mtk-bpi-r3mini-EMMC-20230719.img, bl2_emmc.img) to USB disk.</p>
</li>
<li>
<p>Change boot switch Jumper, the board boot from Nand device, then power up the board.</p>
</li>
<li>
<p>Plug in USB disk to the board, and mount the USB to /mnt or other directory as follows: (you can skip mounting if it is mounted automatically)</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">mount -t vfat /dev/sda1 /mnt</code></pre>
</div>
</div>
<div class="paragraph">
<p>change your directory to the mounting point, here is :</p>
</div>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">cd /mnt</code></pre>
</div>
</div>
</li>
<li>
<p>Execute following command to enable and copy image to EMMC device:</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">echo 0 &gt; /sys/block/mmcblk0boot0/force_ro
dd if=bl2_emmc-r3mini.img of=/dev/mmcblk0boot0
dd if=mtk-bpi-r3mini-EMMC-20230719.img of=/dev/mmcblk0
mmc bootpart enable 1 1 /dev/mmcblk0</code></pre>
</div>
</div>
</li>
<li>
<p>Power off R3MINI board, unplug the USB drive, and change the boot program to boot from the emmc device.</p>
<div class="admonitionblock warning">
<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
Note: Enable EMMC device, boot strap is from EMMC.
</td>
</tr>
</tbody></table>
</div>
</li>
</ol>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_install_image_to_onboard_nand"><a href="#_install_image_to_onboard_nand" class="toc-anchor">¶</a> Install Image to onboard Nand</h3>
<div class="admonitionblock warning">
<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
Note: when you want to Update Nand device, Firstly Change boot switch to boot from EMMC device, then after boot up,you need flash one nand image into nand device. Finally you change bootstrap to boot from Nand device.
</td>
</tr>
</tbody></table>
</div>
<div class="paragraph">
<p>Before burning image into Nand, please prepare a USB disk. Let’s take OpenWrt image (mtk-bpi-r3mini-NAND-20230719-single-image.bin) for example, the steps are below:</p>
</div>
<div class="olist arabic">
<ol class="arabic">
<li>
<p>Copy Nand boot OpenWrt image(mtk-bpi-r3mini-NAND-20230719-single-image.bin) to USB disk.</p>
</li>
<li>
<p>Change boot switch Jumper, the board boot from EMMC device, then power up the board.</p>
</li>
<li>
<p>Plug in USB disk to the board, and mount the USB to /mnt or other directory as follows: (you can skip mounting if it is mounted automatically)</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">mount -t vfat /dev/sda1 /mnt</code></pre>
</div>
</div>
<div class="paragraph">
<p>change your directory to the mounting point, here is :</p>
</div>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">cd /mnt</code></pre>
</div>
</div>
</li>
<li>
<p>Execute following command to erase the whole Nand flash and copy image to nand device:</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">mtd erase /dev/mtd0
dd if=mtk-bpi-r3mini-NAND-20230719-single-image.bin of=/dev/mtdblock0</code></pre>
</div>
</div>
</li>
<li>
<p>Power off BPI-R3 MINI board, remove u-disk driver, change bootstrap to boot from Nand device.</p>
<div class="admonitionblock warning">
<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
Note: Enable Nand device, boot strap is from Nand.
</td>
</tr>
</tbody></table>
</div>
</li>
</ol>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_jffs2_error_solution"><a href="#_jffs2_error_solution" class="toc-anchor">¶</a> jffs2 error solution</h3>
<div class="paragraph">
<p>After you finish burning emmc, switch to emmc boot, but the serial port keeps outputting jffs2 errors. You can use the following method to solve it.</p>
</div>
<div class="olist arabic">
<ol class="arabic">
<li>
<p>First, switch back to NAND boot. Execute the following command to write zero to emmc.</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">dd if=/dev/zero of=/dev/mmcblk0</code></pre>
</div>
</div>
</li>
<li>
<p>Then re-burn the emmc according to the <a class="is-internal-link is-valid-page" href="/en/BPI-R3_Mini/GettingStarted_BPI-R3_Mini#_install_image_to_onboard_emmc">document</a>.</p>
</li>
</ol>
</div>
</div>
</div>
</div>

<h3 class="toc-header" id="_wifi_settings"><a href="#_wifi_settings" class="toc-anchor">¶</a> WiFi settings</h3>
<div class="olist arabic">
<ol class="arabic">
<li>
<p>You can change its configuration in the system’s /etc/config/wireless directory.</p>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">config wifi-device 'radio0'
        option type 'mac80211'
        option path 'platform/18000000.wbsys'
        option channel '1'
        option band '2g'
        option htmode 'HE20'
        option cell_density '0'

config wifi-iface 'default_radio0'
        option device 'radio0'
        option network 'lan'
        option mode 'ap'
        option encryption 'none'
        option ssid 'OpenWrt-2.4G'

config wifi-device 'radio1'
        option type 'mac80211'
        option path 'platform/18000000.wbsys+1'
        option channel '36'
        option band '5g'
        option htmode 'HE80'
        option cell_density '0'

config wifi-iface 'default_radio1'
        option device 'radio1'
        option network 'lan'
        option mode 'ap'
        option encryption 'none'
        option ssid 'OpenWrt-5G'</code></pre>
</div>
</div>
</li>

<div class="sect2">
<h3 class="toc-header" id="_gpio_control"><a href="#_gpio_control" class="toc-anchor">¶</a> GPIO Control</h3>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">echo xxx &gt; /sys/class/gpio/export
echo in/out &gt; /sys/class/gpio/gpioxxx/direction
echo 0/1 &gt; /sys/class/gpio/gpioxxx/value</code></pre>
</div>
</div>
<div class="paragraph">
<p>Check the base gpio, you could see mine is 411</p>
</div>
<div class="paragraph">
<p>For example: if you want to change gpio 22 as out highlevel, you need input commands like this：</p>
</div>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">echo 433（22+411） &gt; /sys/class/gpio/export
echo out &gt; /sys/class/gpio/gpio433/direction
echo 1 &gt; /sys/class/gpio/gpio433/value</code></pre>
</div>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_fan"><a href="#_fan" class="toc-anchor">¶</a> FAN</h3>
<div class="imageblock">
<div class="content">
<img alt="r3mini-fan-con.png" src="/picture/r3mini-fan-con.png">
</div>
</div>
<div class="paragraph">
<p>CN16 is a 1.25 pitch 3PIN socket, used to connect the fan, supports PWM control.</p>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_pwm_fan_control"><a href="#_pwm_fan_control" class="toc-anchor">¶</a> PWM FAN Control</h3>
<div class="listingblock">
<div class="content">
<pre v-pre="true" class="highlight prismjs line-numbers"><code data-lang="sh" class="language-sh">echo 0 &gt; /sys/class/pwm/pwmchip0/export
echo 10000 &gt; /sys/class/pwm/pwmchip0/pwm0/period
echo 5000 &gt; /sys/class/pwm/pwmchip0/pwm0/duty_cycle
echo normal &gt; /sys/class/pwm/pwmchip0/pwm0/polarity
echo 1 &gt; /sys/class/pwm/pwmchip0/pwm0/enable</code></pre>
</div>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_m_2_key_b_slot"><a href="#_m_2_key_b_slot" class="toc-anchor">¶</a> M.2 KEY B slot</h3>
<div class="paragraph">
<p>Currently, M.2 KEY B slot only support USB 4G/5G module, example: Quectel RM500U-CN or RM520N-GL</p>
</div>
<div class="imageblock">
<div class="content">
<img alt="r3mini-rm500u-1000.png" src="/picture/r3mini-rm500u-1000.png">
</div>
</div>
<div class="paragraph">
<p>when you install one 4G/5G module, you may check it.</p>
</div>
</div>
<div class="sect2">
<h3 class="toc-header" id="_4g5g_module"><a href="#_4g5g_module" class="toc-anchor">¶</a> 4G/5G Module</h3>
<div class="paragraph">
<p>BPI-R3mini supports <strong>M.2 KEYB USB interface</strong> Cellular network module: 4G LTE EM05, 5G Quectel RM500U-CN/RG200U-CN and RM520N-GL/RM500Q-GL Series.</p>
</div>
<div class="paragraph">
<p>The released image(2023-09-12 or later) default driver is RM500U-CN and RM520N-GL, Install one of these two modules and you can use it directly.</p>
</div>
<div class="paragraph">
<p>If use EM05 or others,you will most likely need to modify the driver.</p>
</div>
<div class="olist arabic">
<ol class="arabic">
<li>
<p>Install 4G/5G Cellular Module into CN4 Slot(M.2 KEYB)</p>
</li>
<li>
<p>Inset the NANOSIM Card</p>
</li>
<li>
<p>Install antenna on the module</p>
</li>
<li>
<p>After powering on, it will automatically dial</p>
</li>
</ol>
</div>

<h3 class="toc-header" id="_wi_fi_ap_mode_on_bpi_r3mini"><a href="#_wi_fi_ap_mode_on_bpi_r3mini" class="toc-anchor">¶</a> Wi-Fi Ap mode on BPI-R3mini</h3>
<div class="ulist">
<ul>
<li>
<p>ra0 is MT7986a 2.4G wifi</p>

<p>rax0 is MT7986a 5G wifi</p>

</div>
<div class="sect2">
<h3 class="toc-header" id="_serial_cable"><a href="#_serial_cable" class="toc-anchor">¶</a> Serial cable</h3>
<div class="paragraph">
<p>Because the UART0_TXD of the debug port is also a wifi strap pin, this pin needs to be pull-low when poweron，</p>
</div>
<div class="paragraph">
<p>some serial cable have strong pull-up, such as PL2303,if it is inserted before powering on, it will cause the wifi chip to be recognized incorrectly, and the wifi function will fail.</p>
</div>
<div class="paragraph">
<p>Other types including cp2102,ch340 and FDTI are all available, serial cable power domian must be 3.3v TTL standard.</p>
</div>
<div class="paragraph">
<p>You can buy the serial cable here: <a class="bare is-external-link" href="https://www.aliexpress.us/item/3256805457599756.html">https://www.aliexpress.us/item/3256805457599756.html</a></p>
</div>
<div class="imageblock">
<div class="content">
<img alt="r3mini-usbc2uart.png" src="/picture/r3mini-usbc2uart.png">
</div>
</div>
<div class="paragraph">
<p>If your computer has a USB TypeC connector and supports PD12V/1.5A (20W) or above, you can also directly use the computer to power BPI-R3mini.</p>
</div>
<div class="paragraph">
<p>Moreover, since BPI-R3mini has built-in USB to serial port chip CH340E, you do not need to use additional serial cables.</p>
</div>
<div class="admonitionblock warning">
<table>
<tbody><tr>
<td class="icon">
<i title="Warning" class="fa icon-warning"></i>
</td>
<td class="content">
NOTE: If your computer does not support USB PD, then the R3mini will most likely keep restarting.
</td>
</tr>
</tbody></table>
</div>
<div class="paragraph">
<p>Because the power consumption of R3mini is relatively large (all peripherals are plugged in and the power consumption is close to 20W when running)</p>
</div>
</div>
</div>
</div>
